name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mergelog-rs

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match Cargo.toml version (${VERSION})"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            archive_ext: tar
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: false
            archive_ext: tar
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
            archive_ext: tar

    env:
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install musl-tools
        if: contains(matrix.target, 'musl') && !matrix.use_cross
        run: sudo apt-get update --yes && sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Create archive
        shell: bash
        run: |
          STAGING="${BINARY_NAME}-v${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "${STAGING}/"
          tar czf "${STAGING}.tar.gz"  "${STAGING}"
          tar cJf "${STAGING}.tar.xz"  "${STAGING}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-v${{ env.VERSION }}-${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-v${{ env.VERSION }}-${{ matrix.target }}.tar.gz
            ${{ env.BINARY_NAME }}-v${{ env.VERSION }}-${{ matrix.target }}.tar.xz
          if-no-files-found: ignore

      - name: Upload tar.gz to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_NAME }}-v${{ env.VERSION }}-${{ matrix.target }}.tar.gz
          tag: ${{ github.ref }}

      - name: Upload tar.xz to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.BINARY_NAME }}-v${{ env.VERSION }}-${{ matrix.target }}.tar.xz
          tag: ${{ github.ref }}
